---
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install yamllint ansible ansible-lint

      - name: Run yamllint
        run: yamllint .

      - name: Install collection dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Molecule and dependencies
        run: |
          pip install \
            molecule \
            molecule-docker \
            ansible \
            ansible-lint \
            docker

      - name: Install collection requirements
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test --scenario-name ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run Molecule converge a second time (idempotency check)
        run: |
          molecule converge --scenario-name ${{ matrix.scenario }} 2>&1 | tee /tmp/idempotency.log
          # Fail if any task reports 'changed'
          if grep -E '^(TASK|changed:)' /tmp/idempotency.log | grep -q 'changed:'; then
            echo "ERROR: Idempotency check failed — tasks reported changed on second run."
            cat /tmp/idempotency.log
            exit 1
          fi
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
