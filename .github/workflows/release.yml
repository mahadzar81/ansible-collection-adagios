---
name: Release & Publish to Galaxy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # Matches tags like v1.2.0, v2.0.1, etc.

permissions:
  contents: write   # Needed to create GitHub Releases

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate the tag format and extract the semver version
  # ---------------------------------------------------------------------------
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "Tag: ${TAG}"
          echo "Version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assert galaxy.yml version matches tag
        run: |
          GALAXY_VERSION=$(grep '^version:' galaxy.yml | awk '{print $2}')
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          echo "galaxy.yml version : ${GALAXY_VERSION}"
          echo "Tag version        : ${TAG_VERSION}"
          if [ "${GALAXY_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: galaxy.yml version (${GALAXY_VERSION}) does not match tag (${TAG_VERSION})."
            echo "Please bump the version in galaxy.yml before tagging."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 2. Build the collection tarball
  # ---------------------------------------------------------------------------
  build:
    name: Build collection
    runs-on: ubuntu-latest
    needs: validate-tag
    outputs:
      tarball: ${{ steps.build.outputs.tarball }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Build collection tarball
        id: build
        run: |
          ansible-galaxy collection build --output-path ./dist/ --force
          TARBALL=$(ls dist/*.tar.gz | head -n1)
          echo "Built: ${TARBALL}"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-tarball
          path: dist/*.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Create GitHub Release with auto-generated changelog
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Download collection tarball
        uses: actions/download-artifact@v8
        with:
          name: collection-tarball
          path: dist/

      - name: Generate changelog since last tag
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          echo "Previous tag: ${PREV_TAG}"
          if [ -z "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "${CHANGELOG}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Ansible Collection — mahadzar81.adagios ${{ github.ref_name }}

            ### Changes since last release
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Installation
            ```bash
            ansible-galaxy collection install mahadzar81.adagios:==${{ needs.validate-tag.outputs.version }}
            ```

            ### What's included
            - **nagios_core** role — Nagios Core ${{ needs.validate-tag.outputs.version }} from source, SELinux-ready
            - **adagios** role — Adagios web UI with MK Livestatus and PNP4Nagios
            - Full SELinux support for RHEL/Rocky Linux (file contexts, booleans, custom TE policy)
            - Idempotent design (version stamps, creates guards, git module tracking)
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: false

  # ---------------------------------------------------------------------------
  # 4. Publish to Ansible Galaxy
  # ---------------------------------------------------------------------------
  galaxy-publish:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build
      - github-release
    steps:
      - name: Download collection tarball
        uses: actions/download-artifact@v8
        with:
          name: collection-tarball
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Publish to Ansible Galaxy
        run: |
          TARBALL=$(ls dist/*.tar.gz | head -n1)
          echo "Publishing ${TARBALL} to Ansible Galaxy..."
          ansible-galaxy collection publish \
            "${TARBALL}" \
            --api-key "${{ secrets.GALAXY_API_KEY }}" \
            --server https://galaxy.ansible.com
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}

      - name: Confirm publication
        run: |
          echo "Collection mahadzar81.adagios v${{ needs.validate-tag.outputs.version }} published to Ansible Galaxy."
          echo "View at: https://galaxy.ansible.com/mahadzar81/adagios"
