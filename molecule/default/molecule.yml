---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: rocky9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /usr/lib/systemd/systemd
    pre_build_image: true
    docker_networks:
      - name: molecule_net
    env:
      container: docker

  - name: rocky8
    image: geerlingguy/docker-rockylinux8-ansible:latest
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /usr/lib/systemd/systemd
    pre_build_image: true
    docker_networks:
      - name: molecule_net

  - name: ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    pre_build_image: true
    docker_networks:
      - name: molecule_net

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        nagiosadmin_pass: "Molecule_T3st_Pass!"
        nagios_selinux_manage: false   # Docker containers lack full SELinux
        adagios_selinux_manage: false
  options:
    vvv: false
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
      stdout_callback: yaml

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint