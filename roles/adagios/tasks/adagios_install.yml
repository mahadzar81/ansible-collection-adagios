---
- name: Ensure Git ignores file mode changes globally (or locally if repo exists)
  git_config:
    name: core.filemode
    scope: global
    value: "false"

- name: Clone Adagios Repo
  git:
    repo: "{{ adagios_repo }}"
    dest: /opt/adagios
    version: master 
    update: yes

- name: Create Adagios config directory
  file:
    path: /etc/adagios
    state: directory
    owner: nagios
    group: nagios
    mode: '0775'

- name: Create Adagios data and userdata directories
  file:
    path: "{{ item }}"
    state: directory
    owner: nagios
    group: nagios
    mode: '0775'
  loop:
    - /var/lib/adagios
    - /var/lib/adagios/userdata

- name: Create Adagios object directory
  file:
    path: /etc/nagios/adagios
    state: directory
    owner: nagios
    group: nagios
    mode: '0775'

- name: Ensure nagios.cfg includes the Adagios object directory
  lineinfile:
    path: /usr/local/nagios/etc/nagios.cfg
    regexp: '^cfg_dir=/etc/nagios/adagios'
    line: 'cfg_dir=/etc/nagios/adagios'
    state: present
  notify: restart nagios

- name: Copy sample config if not present
  copy:
    src: /opt/adagios/adagios/etc/adagios/adagios.conf
    dest: /etc/adagios/adagios.conf
    remote_src: yes
    force: no

- name: Install Python build tools and requirements
  pip:
    name: 
      - wheel
      - setuptools
      - future
    executable: pip3
    state: present
    extra_args: >-
      {% set use_break = false %}
      {% if ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('23.04', '>=') %}
        {% set use_break = true %}
      {% elif ansible_distribution == 'Debian' and ansible_distribution_major_version is version('12', '>=') %}
        {% set use_break = true %}
      {% elif ansible_os_family == 'RedHat' and ansible_distribution_major_version is version('10', '>=') %}
        {% set use_break = true %}
      {% endif %}
      {{ '--break-system-packages' if use_break else '' }}


- name: Install Adagios requirements from file
  pip:
    requirements: /opt/adagios/requirements.txt
    executable: pip3
    extra_args: >-
      {% set use_break = false %}
      {% if ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('23.04', '>=') %}
        {% set use_break = true %}
      {% elif ansible_distribution == 'Debian' and ansible_distribution_major_version is version('12', '>=') %}
        {% set use_break = true %}
      {% elif ansible_os_family == 'RedHat' and ansible_distribution_major_version is version('10', '>=') %}
        {% set use_break = true %}
      {% endif %}
      {{ '--break-system-packages' if use_break else '' }}

- name: Ensure python3-future is installed (dependency for build)
  pip:
    name: future
    executable: pip3
    state: present
    extra_args: >-
      {% set use_break = false %}
      {% if ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('23.04', '>=') %}
        {% set use_break = true %}
      {% elif ansible_distribution == 'Debian' and ansible_distribution_major_version is version('12', '>=') %}
        {% set use_break = true %}
      {% elif ansible_os_family == 'RedHat' and ansible_distribution_major_version is version('10', '>=') %}
        {% set use_break = true %}
      {% endif %}
      {{ '--break-system-packages' if use_break else '' }}

- name: Patch Adagios settings.py for Python 3 compatibility
  ansible.builtin.replace:
    path: /opt/adagios/adagios/settings.py
    regexp: '\[ord\(x\) for x in os\.urandom\(length\)\]'
    replace: 'os.urandom(length)'
  when: ansible_python.version.major >= 3

- name: Install Adagios from source
  pip:
    name: /opt/adagios
    executable: pip3
    state: present
    extra_args: "--no-build-isolation"
    chdir: /opt/adagios
  register: pip_install
  changed_when: "'Requirement already satisfied' not in pip_install.stdout"

- name: Configure Adagios to use the correct nagios.cfg path
  lineinfile:
    path: /etc/adagios/adagios.conf
    regexp: '^\s*nagios_config\s*='
    line: 'nagios_config = "/usr/local/nagios/etc/nagios.cfg"'
    state: present
  notify: restart apache

- name: Configure Adagios destination directory
  lineinfile:
    path: /etc/adagios/adagios.conf
    regexp: '^\s*destination_directory\s*='
    line: 'destination_directory = "/etc/nagios/adagios/"'
    state: present
  notify: restart apache

- name: Configure Adagios Apache Config
  template:
    src: adagios.conf.j2
    dest: "{{ apache_conf_dir }}/adagios.conf"
  notify: restart apache

- name: Ensure Nagios group has write access to config (Idempotent version)
  ansible.builtin.file:
    path: /usr/local/nagios/etc
    state: directory
    recurse: yes
    mode: 'u=rwX,g=rwX,o=rX'