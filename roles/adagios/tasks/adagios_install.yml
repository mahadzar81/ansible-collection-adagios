---
# ---------------------------------------------------------------------------
# Clone Adagios source
#
# The git module runs `git ls-remote origin` to check if an update is needed.
# In restricted network environments (CI containers, air-gapped hosts) this
# can fail even when the repo is already cloned. We therefore:
#   1. Stat the destination first.
#   2. Only attempt the clone/update when the dir does not already exist OR
#      when the caller explicitly sets adagios_force_update=true.
#   3. Use accept_hostkey + a 30-second timeout to fail fast instead of hang.
# ---------------------------------------------------------------------------
- name: Stat Adagios source directory
  ansible.builtin.stat:
    path: /usr/local/src/adagios-source/.git
  register: _adagios_git_dir

- name: Clone Adagios repository
  ansible.builtin.git:
    repo: "{{ adagios_repo }}"
    dest: /usr/local/src/adagios-source
    version: "{{ adagios_version }}"
    update: "{{ adagios_force_update | default(false) }}"
    force: true
    accept_hostkey: true
    depth: 1
  register: _adagios_git_clone
  when: not _adagios_git_dir.stat.exists or (adagios_force_update | default(false) | bool)

# ---------------------------------------------------------------------------
# Operational directory
# ---------------------------------------------------------------------------
- name: Ensure /opt/adagios directory exists
  ansible.builtin.file:
    path: /opt/adagios
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0755"

- name: Copy Adagios files to operational directory
  ansible.builtin.command:
    cmd: cp -a /usr/local/src/adagios-source/. /opt/adagios/
    creates: /opt/adagios/adagios/etc/adagios/adagios.conf
  when: _adagios_git_clone.changed | default(false) or not _adagios_git_dir.stat.exists

# ---------------------------------------------------------------------------
# Config directories
# ---------------------------------------------------------------------------
- name: Create Adagios config directory
  ansible.builtin.file:
    path: /etc/adagios
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0775"

- name: Create Adagios data and userdata directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0775"
  loop:
    - /var/lib/adagios
    - /var/lib/adagios/userdata

- name: Create Adagios object directory
  ansible.builtin.file:
    path: /etc/nagios/adagios
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0775"

- name: Ensure nagios.cfg includes the Adagios object directory
  ansible.builtin.lineinfile:
    path: /usr/local/nagios/etc/nagios.cfg
    regexp: '^cfg_dir=/etc/nagios/adagios'
    line: 'cfg_dir=/etc/nagios/adagios'
    state: present
  notify: restart nagios

- name: Copy sample Adagios config if not already present
  ansible.builtin.copy:
    src: /opt/adagios/adagios/etc/adagios/adagios.conf
    dest: /etc/adagios/adagios.conf
    remote_src: true
    force: false
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0640"

# ---------------------------------------------------------------------------
# Python dependencies
# ---------------------------------------------------------------------------
- name: Determine if pip requires --break-system-packages
  ansible.builtin.set_fact:
    pip_break_args: >-
      {%- if (ansible_distribution == 'Ubuntu' and
              ansible_distribution_version is version('23.04', '>=')) or
             (ansible_distribution == 'Debian' and
              ansible_distribution_major_version is version('12', '>=')) or
             (ansible_os_family == 'RedHat' and
              ansible_distribution_major_version is version('10', '>=')) -%}
      --break-system-packages
      {%- else -%}
      {%- endif -%}

- name: Install Python build tools
  ansible.builtin.pip:
    name:
      - wheel
      - setuptools
      - future
    executable: pip3
    state: present
    extra_args: "{{ pip_break_args | trim if pip_break_args | trim else omit }}"

- name: Install Adagios Python requirements
  ansible.builtin.pip:
    requirements: /opt/adagios/requirements.txt
    executable: pip3
    extra_args: "{{ pip_break_args | trim if pip_break_args | trim else omit }}"

# ---------------------------------------------------------------------------
# Python 3 compatibility patch
# ---------------------------------------------------------------------------
- name: Patch Adagios settings.py for Python 3 compatibility
  ansible.builtin.replace:
    path: /opt/adagios/adagios/settings.py
    regexp: '\[ord\(x\)\s+for\s+x\s+in\s+os\.urandom\(length\)\]'
    replace: 'os.urandom(length)'
    backup: true
  when: (ansible_python.version.major | default(2) | int) >= 3

# ---------------------------------------------------------------------------
# Install Adagios package (idempotent via pip show check)
# ---------------------------------------------------------------------------
- name: Check if Adagios is already installed
  ansible.builtin.command:
    cmd: pip3 show adagios
  register: _adagios_pip_check
  changed_when: false
  failed_when: false

- name: Install Adagios from source
  ansible.builtin.pip:
    name: /opt/adagios
    executable: pip3
    state: present
    extra_args: >-
      --no-build-isolation
      {{ pip_break_args | trim if pip_break_args | trim else '' }}
  when: _adagios_pip_check.rc != 0

# ---------------------------------------------------------------------------
# Adagios configuration
# ---------------------------------------------------------------------------
- name: Configure Adagios nagios_config path
  ansible.builtin.lineinfile:
    path: /etc/adagios/adagios.conf
    regexp: '^\s*nagios_config\s*='
    line: 'nagios_config = "/usr/local/nagios/etc/nagios.cfg"'
    state: present
  notify: restart apache

- name: Configure Adagios destination_directory
  ansible.builtin.lineinfile:
    path: /etc/adagios/adagios.conf
    regexp: '^\s*destination_directory\s*='
    line: 'destination_directory = "/etc/nagios/adagios/"'
    state: present
  notify: restart apache

- name: Deploy Adagios Apache config
  ansible.builtin.template:
    src: adagios.conf.j2
    dest: "{{ apache_conf_dir }}/adagios.conf"
    owner: root
    group: root
    mode: "0644"
  notify: restart apache

- name: Ensure Nagios group has write access to config directory
  ansible.builtin.file:
    path: /usr/local/nagios/etc
    state: directory
    recurse: true
    mode: "u=rwX,g=rwX,o=rX"
