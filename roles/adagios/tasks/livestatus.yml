---
# ---------------------------------------------------------------------------
# MK Livestatus — compiled from source, idempotent via version stamp
# ---------------------------------------------------------------------------
- name: Check for existing Livestatus version stamp
  ansible.builtin.slurp:
    src: "{{ livestatus_broker_dir }}/.ansible_livestatus_version"
  register: _ls_stamp
  ignore_errors: true

- name: Set fact for installed Livestatus version
  ansible.builtin.set_fact:
    _ls_installed_version: "{{ (_ls_stamp.content | b64decode | trim) if not _ls_stamp.failed else '' }}"

- name: Ensure Livestatus broker directory exists
  ansible.builtin.file:
    path: "{{ livestatus_broker_dir }}"
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0755"

- name: Download MK Livestatus source
  ansible.builtin.get_url:
    url: "{{ livestatus_src_base }}/mk-livestatus-{{ livestatus_version }}.tar.gz"
    dest: /tmp/mk-livestatus-{{ livestatus_version }}.tar.gz
    mode: "0644"
    timeout: 120
  when: _ls_installed_version != livestatus_version

- name: Extract MK Livestatus source
  ansible.builtin.unarchive:
    src: /tmp/mk-livestatus-{{ livestatus_version }}.tar.gz
    dest: /tmp/
    remote_src: true
    creates: /tmp/mk-livestatus-{{ livestatus_version }}/configure
  when: _ls_installed_version != livestatus_version

- name: Configure MK Livestatus build
  ansible.builtin.command:
    cmd: ./configure
    chdir: /tmp/mk-livestatus-{{ livestatus_version }}
    creates: /tmp/mk-livestatus-{{ livestatus_version }}/Makefile
  when: _ls_installed_version != livestatus_version

- name: Compile MK Livestatus
  ansible.builtin.command:
    cmd: make
    chdir: /tmp/mk-livestatus-{{ livestatus_version }}
    creates: /tmp/mk-livestatus-{{ livestatus_version }}/src/livestatus.o
  when: _ls_installed_version != livestatus_version

- name: Copy Livestatus broker module
  ansible.builtin.copy:
    src: /tmp/mk-livestatus-{{ livestatus_version }}/src/livestatus.o
    dest: "{{ livestatus_broker_dir }}/livestatus.o"
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0755"
    remote_src: true
  when: _ls_installed_version != livestatus_version
  notify: Restart nagios

- name: Write Livestatus version stamp
  ansible.builtin.copy:
    content: "{{ livestatus_version }}"
    dest: "{{ livestatus_broker_dir }}/.ansible_livestatus_version"
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0644"
  when: _ls_installed_version != livestatus_version

- name: Ensure Livestatus broker line in nagios.cfg (idempotent)
  ansible.builtin.lineinfile:
    path: "{{ nagios_home }}/etc/nagios.cfg"
    regexp: '^broker_module=.*livestatus'
    line: "broker_module={{ livestatus_broker_dir }}/livestatus.o /var/run/nagios/live"
    state: present
    backup: true
  notify: Restart nagios

- name: Ensure Livestatus socket directory exists
  ansible.builtin.file:
    path: /var/run/nagios
    state: directory
    owner: "{{ nagios_user }}"
    group: "{{ nagios_group }}"
    mode: "0755"
