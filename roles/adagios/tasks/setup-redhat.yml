---
- name: Install Adagios dependencies (RedHat)
  ansible.builtin.package:
    name:
      - git
      - python3
      - python3-pip
      - python3-devel
      - python3-virtualenv
      - gcc
      - make
      - wget
      - libffi-devel
      - openssl-devel
      - rrdtool
      - rrdtool-devel
      - perl-Time-HiRes
      - perl-Sys-Hostname-Long
      - perl-Crypt-DES
      - perl-Digest-HMAC
      - perl-Digest-SHA1
      - perl-IO-Socket-INET6
      - net-snmp-perl
    state: present

- name: Install pip packages needed for Adagios (RedHat)
  ansible.builtin.pip:
    name:
      - virtualenv
      - setuptools
    state: present
    executable: pip3
