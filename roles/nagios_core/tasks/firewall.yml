---
- name: Open HTTP port via firewalld (RedHat)
  ansible.posix.firewalld:
    service: http
    zone: "{{ nagios_firewall_zone }}"
    permanent: true
    immediate: true
    state: enabled
  when:
    - ansible_os_family == "RedHat"
    - nagios_firewall_manage | bool

- name: Open HTTP port via ufw (Debian)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    state: enabled
  when:
    - ansible_os_family == "Debian"
    - nagios_firewall_manage | bool
