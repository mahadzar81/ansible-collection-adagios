---
- name: Assert required variables are set
  ansible.builtin.assert:
    that:
      - nagiosadmin_pass is defined
      - nagiosadmin_pass | length > 0
      - nagiosadmin_pass != "Welcome123"
    fail_msg: >
      nagiosadmin_pass must be set to a non-default value.
      Please override it in your vars or vault.
    success_msg: "Required variables are set."

- name: Include OS-specific tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - "setup-{{ ansible_distribution | lower }}.yml"
    - "setup-{{ ansible_os_family | lower }}.yml"
    - "setup-unsupported.yml"

- name: Install and compile Nagios Core
  ansible.builtin.include_tasks: install.yml

- name: Configure Apache for Nagios
  ansible.builtin.include_tasks: apache.yml

- name: Manage firewall rules
  ansible.builtin.include_tasks: firewall.yml
  when: nagios_firewall_manage | bool

- name: Manage SELinux policy
  ansible.builtin.include_tasks: selinux.yml
  when:
    - nagios_selinux_manage | bool
    - ansible_selinux is defined
    - ansible_selinux.status == "enabled"
